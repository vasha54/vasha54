name: Generar PDF del README y de los archivos en cv

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'README.md'
      - 'img/**'
      - 'cv/**'
  workflow_dispatch:

jobs:
  crear-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Generar README_local.md con rutas locales
        run: |
          sed -E 's|https://github\.com/vasha54/vasha54/blob/main/([^)"[:space:]]+)|\1|g' README.md > README_local.md
          echo "Contenido de README_local.md (primeras 20 líneas):"
          head -n 20 README_local.md

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar md-to-pdf
        run: npm install -g md-to-pdf

      - name: Convertir README_local.md a PDF
        run: |
          md-to-pdf README_local.md \
            --launch-options '{"args":["--no-sandbox"]}' \
            --basedir .

      - name: Renombrar PDF del README
        run: mv README_local.pdf CV_Luis_Andres_Valido_Fajardo.pdf

      - name: Convertir todos los archivos .md en cv/ a PDF
        run: |
          for f in cv/*.md; do
            if [ -f "$f" ]; then
              echo "Convirtiendo $f a PDF..."
              md-to-pdf "$f" \
                --launch-options '{"args":["--no-sandbox"]}' \
                --basedir .
            fi
          done

      - name: Subir PDF del CV (README) como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: CV_Luis_Andres_Valido_Fajardo.pdf
          path: CV_Luis_Andres_Valido_Fajardo.pdf

      - name: Subir todos los PDFs de cv/ como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cv_pdfs
          path: cv/*.pdf