name: Generar PDF del README

# Se ejecuta cuando hay push en main/master y se modifica README.md
# También se puede ejecutar manualmente desde la pestaña Actions
on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  crear-pdf:
    runs-on: ubuntu-latest
    steps:
      # 1. Obtener el código del repositorio
      - name: Obtener código
        uses: actions/checkout@v4

      # 2. Instalar Node.js (necesario para la herramienta md-to-pdf)
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Instalar la herramienta que convierte Markdown a PDF
      - name: Instalar md-to-pdf
        run: npm install -g md-to-pdf

      # 4. Convertir README.md a PDF
      - name: Convertir README a PDF
        run: md-to-pdf README.md

      # 5. Subir el PDF como artefacto (podrás descargarlo desde Actions)
      - name: Subir PDF como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: README.pdf
          path: README.pdf