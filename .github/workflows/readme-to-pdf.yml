name: Generar PDF del README

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'README.md'
      - 'img/**'           # También se ejecuta si cambian las imágenes
  workflow_dispatch:

jobs:
  crear-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Generar README_local.md con rutas locales
        run: |
          # Reemplaza las URLs de GitHub por rutas relativas locales
          # Ejemplo: https://github.com/vasha54/vasha54/blob/main/img/foto.png -> img/foto.png
          sed -E 's|https://github\.com/vasha54/vasha54/blob/main/([^)"[:space:]]+)|\1|g' README.md > README_local.md
          echo "Contenido de README_local.md (primeras 20 líneas):"
          head -n 20 README_local.md

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar md-to-pdf
        run: npm install -g md-to-pdf

      - name: Convertir README_local.md a PDF
        run: |
          md-to-pdf README_local.md \
            --launch-options '{"args":["--no-sandbox"]}' \
            --basedir .

      - name: Renombrar PDF
        run: mv README_local.pdf CV_Luis_Andres_Valido_Fajardo.pdf
            
      - name: Subir PDF como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: CV_Luis_Andres_Valido_Fajardo.pdf
          path: CV_Luis_Andres_Valido_Fajardo.pdf