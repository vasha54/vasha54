name: Generar PDF del README

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  crear-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar md-to-pdf
        run: npm install -g md-to-pdf

      - name: Convertir README a PDF
        run: md-to-pdf README.md --launch-options '{"args":["--no-sandbox"]}' --basedir . --out CV_Luis_Andres_Valido_Fajardo.pdf

      - name: Subir PDF como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: CV_Luis_Andres_Valido_Fajardo.pdf
          path: CV_Luis_Andres_Valido_Fajardo.pdf